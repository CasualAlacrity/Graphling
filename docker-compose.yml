services:
  postgres:
    image: postgres:16
    container_name: graphling-postgres
    environment:
      POSTGRES_USER: graphling
      POSTGRES_PASSWORD: graphling
      POSTGRES_DB: graphling
    ports:
      - "5433:5432"
    volumes:
      - graphling_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphling"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  graphling_pgdata:
